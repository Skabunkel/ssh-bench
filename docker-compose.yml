services:
  openssh-server:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: openssh-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - USER_NAME=myuser
      - USER_PASSWORD=mysecretpassword
      - PASSWORD_ACCESS=true
    volumes:
      - openssh-config:/config
    ports:
      - "2222:2222"
    restart: unless-stopped

volumes:
  openssh-config:
